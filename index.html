<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSXRewards — Mantenimiento</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #192c37;
    --bg-deep: #0e212d;
    --surface: #162a36;
    --accent: #1e90ff;
    --accent-light: #28a7ff;
    --accent-glow: rgba(30, 144, 255, .15);
    --text: #d7f1ff;
    --muted: #88dbff;
    --muted-dim: rgba(136, 219, 255, .35);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(30,144,255,.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 100%, rgba(10,113,235,.04) 0%, transparent 50%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(40,167,255,.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%);
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 560px;
  }

  /* Logo / Brand */
  .brand {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    margin-bottom: 3rem;
    position: relative;
    display: inline-block;
  }

  .brand span {
    background: linear-gradient(135deg, #d7f1ff 0%, rgba(215,241,255,.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand .accent {
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
  }

  /* Spinner — single clean ring */
  .spinner-wrap {
    margin: 0 auto 2.5rem;
    width: 56px;
    height: 56px;
  }

  .spinner {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(30,144,255,.1);
    border-top-color: var(--accent);
    animation: spin 1.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Text content */
  h1 {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 500;
    color: var(--text);
    margin-bottom: .75rem;
    letter-spacing: -0.01em;
  }

  .sub {
    font-size: clamp(.85rem, 2vw, .95rem);
    color: var(--muted-dim);
    line-height: 1.7;
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto 2rem;
  }

  /* Season Countdown */
  .season-block {
    margin-bottom: 2.5rem;
  }

  .season-label {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted-dim);
    font-weight: 500;
    margin-bottom: .75rem;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: .75rem;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
  }

  .cd-value {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, var(--text) 30%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }

  .cd-label {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: rgba(136,219,255,.25);
    font-weight: 500;
  }

  .cd-sep {
    font-size: 1.6rem;
    color: rgba(30,144,255,.2);
    font-weight: 300;
    line-height: 1;
    padding-top: 2px;
  }

  .end-date {
    font-size: .78rem;
    color: var(--muted-dim);
    font-weight: 300;
  }

  /* Status pill */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 100px;
    background: var(--bg-deep);
    border: 1px solid rgba(30,144,255,.1);
    font-size: .8rem;
    color: var(--muted-dim);
    font-weight: 500;
    letter-spacing: .02em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-light);
    animation: blink 2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(40,167,255,.4);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(30,144,255,.15), transparent);
    margin: 2rem auto;
  }

  /* Socials */
  .socials {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: .5rem;
  }

  .socials a {
    color: var(--muted-dim);
    text-decoration: none;
    font-size: .78rem;
    font-weight: 400;
    padding: 6px 14px;
    border-radius: 8px;
    transition: all .25s ease;
    border: 1px solid transparent;
  }

  .socials a:hover {
    color: var(--text);
    background: rgba(30,144,255,.06);
    border-color: rgba(30,144,255,.12);
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: rgba(30,144,255,.25);
    pointer-events: none;
    z-index: 0;
  }

  .p1 { top: 15%; left: 20%; animation: float 8s ease-in-out infinite; }
  .p2 { top: 70%; left: 75%; animation: float 10s ease-in-out infinite 2s; }
  .p3 { top: 40%; left: 85%; animation: float 7s ease-in-out infinite 4s; width: 3px; height: 3px; background: rgba(10,113,235,.2); }
  .p4 { top: 80%; left: 15%; animation: float 9s ease-in-out infinite 1s; }
  .p5 { top: 25%; left: 60%; animation: float 11s ease-in-out infinite 3s; width: 1px; height: 1px; background: rgba(40,167,255,.3); }

  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: .3; }
    25% { transform: translateY(-20px) translateX(10px); opacity: .7; }
    50% { transform: translateY(-10px) translateX(-15px); opacity: .4; }
    75% { transform: translateY(-25px) translateX(5px); opacity: .6; }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 1.5rem; }
    .spinner-wrap { width: 48px; height: 48px; }
    .spinner { width: 48px; height: 48px; }
  }
</style>
</head>
<body>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>

<div class="container">
  <div class="brand">
    <span class="accent">PSX</span><span>Rewards</span>
  </div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>

  <h1>Estamos actualizando la plataforma</h1>
  <p class="sub">
    Mejoras de seguridad y rendimiento en curso.<br>
    Volveremos en unos minutos.
  </p>

  <!-- Season Countdown -->
  <div class="season-block">
    <div class="season-label" id="season-label">Temporada finaliza en</div>
    <div class="countdown" id="countdown">
      <div class="cd-unit"><div class="cd-value" id="cd-d">--</div><div class="cd-label">Dias</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-value" id="cd-h">--</div><div class="cd-label">Horas</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-value" id="cd-m">--</div><div class="cd-label">Min</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-value" id="cd-s">--</div><div class="cd-label">Seg</div></div>
    </div>
    <div id="end-date" class="end-date"></div>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    Mantenimiento en progreso
  </div>

  <div class="divider"></div>

  <div class="socials">
    <a href="https://kick.com/andypsx">Kick</a>
    <a href="https://discord.gg/andypsx">Discord</a>
    <a href="https://twitter.com/andypsx">Twitter</a>
  </div>
</div>

<script>
// ── UPDATE THIS when the season changes ──
var SEASON_NUMBER = 2;
var SEASON_END_UTC = '2026-03-23T14:00:00.000Z';

var endDate = new Date(SEASON_END_UTC);
var pad = function(n) { return String(n).padStart(2, '0'); };

// Set season label
document.getElementById('season-label').textContent = 'Temporada ' + SEASON_NUMBER + ' finaliza en';

// Show exact end date in client timezone
var dateEl = document.getElementById('end-date');
var localDate = endDate.toLocaleDateString(undefined, {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});
var localTime = endDate.toLocaleTimeString(undefined, {
  hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
});
dateEl.textContent = localDate + ' a las ' + localTime;

// Check if already ended
if (endDate.getTime() <= Date.now()) {
  document.getElementById('season-label').textContent = 'Temporada ' + SEASON_NUMBER;
  document.getElementById('countdown').style.display = 'none';
  dateEl.textContent = 'Finalizada — nueva temporada pronto';
} else {
  function tick() {
    var now = Date.now();
    var diff = endDate.getTime() - now;

    if (diff <= 0) {
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('season-label').textContent = 'Temporada ' + SEASON_NUMBER;
      dateEl.textContent = 'Finalizada — nueva temporada pronto';
      return;
    }

    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-d').textContent = pad(d);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);

    requestAnimationFrame(function() { setTimeout(tick, 1000 - (Date.now() % 1000)); });
  }
  tick();
}
</script>

</body>
</html>
